<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rumo ao Estrelato</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modal.css">
</head>

<body>

  <div class="overlay"></div>

  <div class="menu">
    <h1 class="logo">RUMO AO ESTRELATO</h1>

    <button class="btn" onclick="abrirCriacao()">
      CRIAR CARREIRA
    </button>

    <button class="btn gold" onclick="continuarCarreira()">
      CONTINUAR CARREIRA
    </button>
  </div>

  <!-- MODAL -->
  <div id="modalCriar" class="modal">
    <div class="modal-box">
      <h2>Criar Jogador</h2>

      <input id="nome" placeholder="Nome">
      <input id="sobrenome" placeholder="Sobrenome">

      <select id="posicao">
  <option value="">Selecione a posição</option>

  <optgroup label="ATAQUE">
    <option>Centroavante</option>
    <option>Segundo Atacante</option>
    <option>Extremo Esquerdo</option>
    <option>Extremo Direito</option>
  </optgroup>

  <optgroup label="MEIO-CAMPO">
    <option>Meia Ofensivo</option>
    <option>Meia Central</option>
    <option>Meia Esquerda</option>
    <option>Meia Direita</option>
    <option>Volante</option>
  </optgroup>

  <optgroup label="DEFESA">
    <option>Lateral Direito</option>
    <option>Lateral Esquerdo</option>
    <option>Zagueiro Central</option>
  </optgroup>

  <optgroup label="GOLEIRO">
    <option>Goleiro</option>
  </optgroup>
</select>

      <select id="continente">
        <option>América do Sul</option>
        <option>Europa</option>
        <option>África</option>
        <option>Ásia</option>
        <option>América do Norte</option>
      </select>

      <input id="pais" placeholder="País">

      <button class="btn" onclick="criarJogador()">CONFIRMAR</button>
      <button class="btn gold" onclick="fecharCriacao()">CANCELAR</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="modal.js"></script>
</body>
</html>
