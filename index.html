<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rumo ao Estrelato</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1 class="titulo">RUMO AO ESTRELATO</h1>

    <div class="cards">
      <div class="card" onclick="novaCarreira()">
        <div class="overall">★</div>
        <div class="nome">NOVA</div>
        <div class="info">CARREIRA</div>
      </div>

      <div class="card gold" onclick="carregarCarreira()">
        <div class="overall">▶</div>
        <div class="nome">CARREGAR</div>
        <div class="info">CARREIRA</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
