<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rumo ao Estrelato</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modal.css">
</head>

<body>

  <div class="overlay"></div>

  <div class="menu">
    <h1 class="logo">RUMO AO ESTRELATO</h1>

    <button class="btn" onclick="abrirCriacao()">
      CRIAR CARREIRA
    </button>

    <button class="btn gold" onclick="continuarCarreira()">
      CONTINUAR CARREIRA
    </button>
  </div>

 <!-- MODAL -->
<div id="modalCriar" class="modal">
  <div class="modal-box">
    <h2>Criar Jogador</h2>

    <label>Nome</label>
    <input id="nome" placeholder="Digite o nome">

    <label>Sobrenome</label>
    <input id="sobrenome" placeholder="Digite o sobrenome">

    <label>Posição</label>
    <select id="posicao">
      <option>Centroavante</option>
      <option>Extremo Esquerdo</option>
      <option>Extremo Direito</option>
      <option>Meia Ofensivo</option>
      <option>Meia Central</option>
      <option>Volante</option>
      <option>Lateral Direito</option>
      <option>Lateral Esquerdo</option>
      <option>Zagueiro Central</option>
      <option>Goleiro</option>
    </select>

    <label>Continente</label>
    <select id="continente" onchange="atualizarPaises()">
      <option value="">Selecione</option>
      <option value="america_sul">América do Sul</option>
      <option value="europa">Europa</option>
      <option value="africa">África</option>
      <option value="asia">Ásia</option>
      <option value="america_norte">América do Norte</option>
    </select>

    <label>Nacionalidade</label>
    <select id="pais">
      <option value="">Selecione o continente primeiro</option>
    </select>

    <button class="btn" onclick="criarJogador()">
      CRIAR JOGADOR
    </button>

    <button class="btn gold" onclick="fecharCriacao()">
      CANCELAR
    </button>
  </div>
</div>

  <script src="script.js"></script>
  <script src="modal.js"></script>
</body>
</html>
